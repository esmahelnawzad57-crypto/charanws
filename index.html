<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎭 یاری بڕیاردانی چارەنووسساز</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="glass-container">
        
        <div id="adminSection">
            <h1 id="gameTitle">🎭 یاری بڕیاردانی چارەنووسساز</h1>
            <p class="subtitle" id="gameSubtitle">پرسیارێک بنووسە یان بە AI دروستی بکە و بۆ هاوڕێکانتی بنێرە!</p>

            <div class="friends-grid" id="friendsGrid">
                <div class="friend-card animate-card">اسماعیل</div>
                <div class="friend-card animate-card">شەنیار</div>
                <div class="friend-card animate-card">لێزان</div>
                <div class="friend-card animate-card">سۆنیا</div>
                <div class="friend-card animate-card">شەهین</div>
                <div class="friend-card animate-card">عبدالباست</div>
                <div class="friend-card animate-card">ڕاز</div>
            </div>

            <div class="input-section">
                <textarea id="questionInput" placeholder="پرسیارەکەت لێرە بنووسە یان بە دوگمەی خوارەوە بە AI دروستی بکە... 🤔"></textarea>
                <button id="mainBtn" onclick="generateAIQuestion()">🧠 ١. دروستکردنی پرسیار بە AI</button>
                <button id="sendBtn" onclick="sendQuestionToAll()">🚀 ٢. ناردنی لینک بۆ هەر ٧ هاوڕێکە</button>
            </div>
        </div>

        <div id="friendSection" style="display: none;">
            <h1 id="friendGreeting">سڵاو 👋</h1>
            <p class="subtitle">تکایە بە ڕاستگۆیی وەڵامی ئەم پرسیارەی خوارەوە بدەرەوە:</p>
            
            <div class="question-display" id="displayQuestion"></div>
            
            <div class="input-section">
                <label class="input-label">🎯 کێ هەڵدەبژێریت لە گروپەکە؟</label>
                <select id="votedFriendSelect" class="glass-select">
                    <option value="" disabled selected>--- هاوڕێیەک هەڵبژێره ---</option>
                    <option value="اسماعیل">اسماعیل</option>
                    <option value="شەنیار">شەنیار</option>
                    <option value="لێزان">لێزان</option>
                    <option value="سۆنیا">سۆنیا</option>
                    <option value="شەهین">شەهین</option>
                    <option value="عبدالباست">عبدالباست</option>
                    <option value="ڕاز">ڕاز</option>
                </select>

                <label class="input-label">✍️ بۆچی ئەم کەسەت هەڵبژارد؟ (هۆکارەکەی)</label>
                <textarea id="reasonInput" placeholder="لێرە بنووسە بۆچی شایەنی ئەم بڕیارەیە... 💭"></textarea>
                
                <button id="submitBtn" onclick="submitFriendAnswer()">📤 ناردنی وەڵام و هۆکار بۆ AI</button>
            </div>
        </div>

        <div id="statusMessage" class="status-box"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
