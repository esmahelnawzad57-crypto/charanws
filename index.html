<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎭 یاری بڕیاردانی چارەنووسساز</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        
        <div id="adminSection">
            <h1 id="gameTitle">🎭 یاری بڕیاردانی چارەنووسساز</h1>
            <p class="subtitle" id="gameSubtitle">ئەم وێبسایتە پرسیارێک بە AI دروست دەکات یان خۆت بیننووسە و بۆ هاوڕێکانتی بنێرە!</p>

            <div class="friends-grid" id="friendsGrid">
                <div class="friend-card">اسماعیل</div>
                <div class="friend-card">شەنیار</div>
                <div class="friend-card">لێزان</div>
                <div class="friend-card">سۆنیا</div>
                <div class="friend-card">شەهین</div>
                <div class="friend-card">عبدالباست</div>
                <div class="friend-card">ڕاز</div>
            </div>

            <div class="input-section">
                <textarea id="questionInput" placeholder="پرسیارەکەت لێرە بنووسە یان کلیک لە دوگمەی خوارەوە بکە... 🤔"></textarea>
                <button id="mainBtn" onclick="generateAIQuestion()">🧠 ١. دروستکردنی پرسیار بە AI</button>
                <button id="sendBtn" onclick="sendQuestionToAll()" style="margin-top: 12px; background: linear-gradient(135deg, #22c55e 0%, #15803d 100%); box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3);">🚀 ٢. ناردنی لینک بۆ هەر ٧ هاوڕێکە</button>
            </div>
        </div>

        <div id="friendSection" style="display: none;">
            <h1 id="friendGreeting">سڵاو 👋</h1>
            <p class="subtitle">تکایە بە ڕاستگۆیی وەڵامی ئەم پرسیارەی خوارەوە بدەرەوە:</p>
            
            <div class="question-display" id="displayQuestion"></div>
            
            <div class="input-section">
                <textarea id="answerInput" placeholder="وەڵامەکەت لێرە بنووسە... ✍️"></textarea>
                <button id="submitBtn" onclick="submitFriendAnswer()">📤 ناردنی وەڵام</button>
            </div>
        </div>

        <div id="statusMessage" class="status-box"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
