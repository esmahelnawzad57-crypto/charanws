<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎭 یاری بڕیاردانی چارەنووسساز</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1 id="gameTitle">🎭 یاری بڕیاردانی چارەنووسساز</h1>
        <p class="subtitle" id="gameSubtitle">ئەم وێبسایتە پرسیارێکی ناوازە بە AI دروست دەکات و بۆ هاوڕێکانتی دەنێرێت!</p>

        <div class="friends-grid" id="friendsGrid">
            <div class="friend-card">اسماعیل</div>
            <div class="friend-card">شەنیار</div>
            <div class="friend-card">لێزان</div>
            <div class="friend-card">سۆنیا</div>
            <div class="friend-card">شەهین</div>
            <div class="friend-card">عبدالباست</div>
            <div class="friend-card">ڕاز</div>
        </div>

        <div class="input-section">
            <textarea id="questionInput" placeholder="پرسیاری دروستکراو لێرە دەردەکەوێت... 🤔" readonly></textarea>
            <button id="mainBtn" onclick="generateAIQuestion()">🧠 ١. دروستکردنی پرسیار بە AI</button>
            <button id="sendBtn" onclick="sendQuestionToAll()" style="display: none; margin-top: 10px; background: linear-gradient(135deg, #22c55e 0%, #15803d 100%); box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3);">🚀 ٢. ناردنی لینک بۆ هاوڕێکان</button>
        </div>

        <div class="admin-panel" style="margin-top: 35px; padding: 20px; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 16px; backdrop-filter: blur(10px);">
            <h3 style="color: #f43f5e; margin-bottom: 8px; font-size: 16px;">👑 کۆنتڕۆڵی کۆتایی (تەنها بۆ ئیسماعیل)</h3>
            <p style="font-size: 12px; color: #94a3b8; margin-bottom: 12px; line-height: 1.5;">کاتێک بینیت هاوڕێکانت لە تێلێگرام وەڵامیان دایەوە، وەڵامەکانیان لێرە پەیست بکە تا AI بڕیاری کۆتایی بنووسێت.</p>
            <textarea id="adminAnswersInput" placeholder="وەڵامەکان لێرە پەیست بکە...&#10;نموونە:&#10;اسماعیل: من شەنیار فڕێ دەدەم.&#10;شەنیار: من فڕۆکەکە چاک دەکەم." style="height: 110px; background: rgba(15, 23, 42, 0.6); border-color: rgba(244, 63, 94, 0.3);"></textarea>
            <button id="adminBtn" onclick="sendFinalAISuggestion()" style="background: linear-gradient(135deg, #e11d48 0%, #be123c 100%); box-shadow: 0 4px 15px rgba(225, 29, 72, 0.3); font-size: 15px; padding: 12px;">🔥 ناردنی پێشنیاری کۆتایی AI بۆ گروپ</button>
        </div>

        <div id="statusMessage" class="status-box"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
